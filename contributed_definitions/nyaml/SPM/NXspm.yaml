category: application
doc: |
  Scanning Probe Microscopy (SPM) is a branch of microscopy to study the surface of
  materials at the Atomic level. The technique is mainly motivated from the quantum
  tunneling effect theory though a few of it successor techniques such AFM uses
  electrostatic forces or atomic forces to study the surface of the materials.
  
  This base class mainly is designed as a sckeleton or contains common concepts for
  other SPM sub-techniques such as STM, STS, AFM, etc.

# https://thesis.library.caltech.edu/1943/4/03chapter3.pdf
type: group
NXspm(NXsensor_scan):
  (NXentry):
    definition:
      doc: |
        Name of the definition that is used for the application.
      enumeration: [NXspm]
    scan_mode:
      doc: |
        The mode of the scan.
    scan_type:
      doc: |
        The type of the scan. It could be different value for different tapping mode,
        contact mode, background etc.
    experiment_identifier(NXidentifier):
      doc: |
        Group to keep unique identifier for the experiment that
        could ne a DOI or orcid.
    experiment_description:
      doc: |
        The description of the experiment like comments, ontes from from the experiment.
    experiment_instrument(NXinstrument):
      doc: |
        The instrument information.
      hardware(NXfabrication):
        doc: |
          The hardware description of the core instrument setup of the experiment.
          Usually, the entire instrument is supplied by a single manufacturer.
          To describe the hardware from any sub-components, use the hardware group of that
          sub-component (child group of the NXinstrument group) group.
        vendor:
          doc: |
            Company name of the manufacturer.
        model:
          doc: |
            Version or model of the component named by the manufacturer.
          \@version:
            exists: optional
            doc: |
              If different versions exist are possible, the value in this field should be made
              specific enough to resolve the version.
      software(NXfabrication):
        doc: |
          The software description of the core instrument setup of the experiment.
          Usually, the entire instrument is supplied by a single name/manufacturer/model/etc.
          To describe the software from any sub-components, use the software group.
        vendor:
          doc: |
            Company name of the manufacturer.
        model:
          doc: |
            Version or model of the component named by the manufacturer.
          \@version:
            exists: optional
            doc: |
              If different versions exist are possible, the value in this field should be made
              specific enough to resolve the version.
      real_time_controller(NXrcs):
        exists: optional
        doc: |
          The real-time controller information.
        rcs_frequency(NX_NUMBER):
          exists: optional
      lockin_amplifier(NXlockin):
        exists: optional
        doc: |
          The lock-in amplifier information.
      scan_environment(NXenvironment):
        doc: |
          The environment information.
        tip_temp(NX_NUMBER):
          exists: optional
          unit: NX_TEMPERATURE
          doc: |
            Temperature of STM head. Note: At least one field from stm_head_temperature,
            cryo_bottom_temp and cryo_sheild_temp must be provided.
        cryo_bottom_temp(NX_NUMBER):
          exists: optional
          unit: NX_TEMPERATURE
          doc: |
            Temperature of liquid helium cryostat. Note: At least one field from
            stm_head_temperature, cryo_bottom_temp and cryo_sheild_temp must be provided.
        cryo_shield_temp(NX_NUMBER):
          exists: optional
          unit: NX_TEMPERATURE
          doc: |
            Temperature of liquid nitrogen shield. Note: At
            least one field from stm_head_temperature, cryo_bottom_temp and cryo_sheild_temp.
        scan_name:
          exists: optional
          doc: |
            The name of the scan, mainly lab defined, that helps to differentiate among different
            scans performed in lab.
        current_sensor(NXsensor):
          exists: optional
          doc: |
            This is a link to the current_sensor under the instrument group.
        volatage_sensor(NXsensor):
          exists: optional
          doc: |
            This is a link to the voltage_sensor under the instrument group.
        piazo_sensor(NXsensor):
          exists: optional
          doc: |
            This is a link to the piazo_sensor under the instrument group.
        (NXscan_control):
          doc: |
            The scan control information like scan region or phase space, type of scan (e.g.
            mesh, spiral, etc.), and scan speed, etc. This group mainly stores the raw scan
            data. For processed data or final experimental data would go to NXdata group.
          scan_name:
            exists: optional
            doc: |
              The name of the scan, mainly lab defined, that helps to differentiate among different
              scans performed in lab.
      current_sensor(NXsensor):
        exists: optional
        doc: |
          The sensor information.
        (NXamplifier):
          exists: optional
          doc: |
            An amplifier information for the input signal (e.g. from tip).
      volatage_sensor(NXsensor):
        exists: optional
        doc: |
          The sensor information for the voltage device.
        (NXamplifier):
          exists: optional
      piazo_sensor(NXsensor):
        doc: |
          The piezo sensor refers to the height (or Z) piezo sensor if nothing is
          mentioned along the X and Y directions.
        x(NX_NUMBER):
          unit: NX_LENGTH
          doc: |
            The x position of the piezo. In STS experiment, the piezo stays fixed at
            x,y and z and the the tunneling current is measured with respect to the
            bias voltage (sweep voltage).
        y(NX_NUMBER):
          unit: NX_LENGTH
          doc: |
            The y position of the piezo.
        z(NX_NUMBER):
          unit: NX_LENGTH
          doc: |
            The z position of the piezo.
        piezo_configuration(NXpiezo_config_spm):
          doc: |
            The piezo configuration information like piezoelectric calibration and material
            properties.
        (NXpositioner_spm):
          doc: |
            The positioner information like the position of the tip, the position of the
            sample, PID loop feedback etc.
          z_controller(NXpid):
            doc: |
              The PID controller information for the z-axis.
            z(NX_NUMBER):
              doc: |
                To indicate the relative tip position z between tip and sample. The tip position
                can also be varied when the z_controller is not running.
            controller_status(NX_BOOLEAN):
              doc: |
                Status if controller is active.
        piezo_material(NXpiezoelectric_material):
          exists: optional
          doc: |
            The material description and properties of the piezoelectric scanner materials.
      TEMPERATURE(NXsensor):
        exists: optional
        doc: |
          A group handling the temperature such as cryo, shield and tip. For different
          type of temperature sensors repeat this group.
        temperature(NX_NUMBER):
          exists: optional
          unit: NX_TEMPERATURE
          doc: |
            The temperature of the sample.
        CHANNEL_temp(NX_CHAR):
          exists: optional
          doc: |
            The name of the channel to measure the temperature.
        temperature_calibration(NXcalibration):
          exists: optional
          doc: |
            Calibration of the temperature measurement.
          coefficients(NX_NUMBER):
            unit: NX_ANY
            doc: |
              The coefficients of the calibration.
        TEMPERATURE_DATA(NXdata):
          exists: optional
          doc: |
            Data (e.g, record from SPM head temperature) from temperature sensor.
      bias_spectroscopy_environment(NXenvironment):
        doc: |
          To explain bias (sweep measurement) voltage applied to the sample.
        (NXbias_spectroscopy):
          doc: |
            Setup and scan data for continuous measurement of bias-voltage on the subject of experiment
            vs tunneling current from probe.
          bias_flip_value(NX_NUMBER):
            exists: optional
            doc: |
              The flip value of the bias voltage. Depending on the bias voltage direction
              current can be flipped or same.
          (NXpositioner_spm):
            exists: optional
            doc: |
              The positioner information like the position of the tip, PID loop feedback etc.
            z_controller(NXpid):
              exists: optional
              doc: |
                The PID controller information for the z-axis.
              z_average_time(NX_DATE_TIME):
                exists: optional
                unit: NX_TIME
                doc: |
                  The average time taken by the z-controller to stabilize the tip.
              z_controller_time(NX_DATE_TIME):
                exists: optional
                unit: NX_TIME
                doc: |
                  The time taken by the z-controller to measure physical properties.
              z_controller_hold(NX_BOOLEAN):
                exists: optional
                doc: |
                  The status of the controller to be held on the previous value, before going to the
                  next scan point to measure the physical properties.
              record_final_z(NX_BOOLEAN):
                exists: optional
                doc: |
                  The status of the controller to record the final z position after the scan.
          bias_sweep(NXbias_sweep):
            doc: |
              The bais voltage sweep is a common technique used on the substance or sample or environment
              to study the change in the behavior of the sample or substance or environment due to change
               in applied  bias voltage.
            settling_time(NX_NUMBER):
              unit: NX_TIME
              doc: |
                The time is taken to settle the bias voltage at the desired value. On each sweep usually, the system
                takes time to settle the bias voltage at the next value.
            scan_region(NXobject):
              doc: |
                The scan region (phase space or sub-phase space) is the region where the scan is
                performed.
              scan_offset_bias(NX_NUMBER):
                unit: NX_VOLTAGE
                doc: |
                  The offset of the bias voltage for bias sweep.
              scan_range_bias(NX_NUMBER):
                unit: NX_VOLTAGE
                doc: |
                  The range of the scan is the length of the bias voltage over which the sweep
                  scan will be performed.
              scan_start_bias(NX_NUMBER):
                unit: NX_VOLTAGE
                doc: |
                  The start of the bias scan voltage.
              scan_end_bias(NX_NUMBER):
                unit: NX_VOLTAGE
                doc: |
                  The end of the bias scan voltage.
            linear_sweep(NXobject):
              doc: |
                The linear sweep is a type of sweep where the bias voltage is swept
                linearly from the starting value to the ending value.
              scan_points_bias(NX_NUMBER):
                doc: |
                  The number of voltage points the sweep scan to be performed.
              step_size_bias(NX_NUMBER):
                unit: NX_VOLTAGE
                doc: |
                  The step size of the sweep.
                  The step size is the difference between the two consecutive bias voltage values during the sweep.
              reset_bias(NX_BOOLEAN):
                doc: |
                  The reset_bias is used to reset the bias voltage to the starting value after the
                  sweep is completed.
      sample_bias_votage(NXsensor):
        exists: optional
        doc: |
          The DC bias voltage that is applied to the sample.
        bias_voltage(NX_NUMBER):
          unit: NX_VOLTAGE
          doc: |
            The bias voltage (DC) applied to the sample.
        bias_offset(NX_NUMBER):
          exists: optional
          unit: NX_VOLTAGE
          doc: |
            Offset value of the bias voltage.
        bias_calibration(NXcalibration):
          exists: optional
          doc: |
            Calibration of the bias voltage measurement (V/V).
          caliberation_time(NX_DATE_TIME):
            exists: optional
            unit: NX_TIME
            doc: |
              The time or period is taken by the calibration to setup to acquire the data for
              the calibration.
          coefficients(NX_NUMBER):
            exists: optional
            unit: NX_ANY
            doc: |
              The coefficients of the calibration.
    (NXsample):
      doc: |
        The sample information.
      sample_environment(NXenvironment):
        doc: |
          Information of environment around the sample.
        sample_bias_voltage(NXsensor):
          doc: |
            Link to the sample_bias_voltage sensor under the instrument.
    reproducibility_indicators(NXobject):
      doc: |
        The reproducibility indicators are the indicators (links to the existing fields in different groups) that are used to measure the reproducibility of the
        experiment. The reproducibility is the ability of the experiment to produce the same results when
        performed under the same conditions.
    resolution_indicators(NXobject):
      doc: |
        The resolution indicators are the indicators (links to the existing fields in different groups) that are used to measure the resolution of the
        experiment. The resolution is the ability of the experiment to generate fine plots or images from the scan data.


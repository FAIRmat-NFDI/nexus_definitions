category: application
doc: |
  An application definition to describe Atomic Force Microscopy (AFM).
type: group
NXafm(NXspm):
  (NXentry):
    definition:
      doc: |
        Name of the definition that is used for the application.
      enumeration: [NXafm]
    scan_mode:
      doc: |
        The mode of the scan.
      enumeration: [contact mode, tapping mode, non-contact mode]
    experiment_insturment(NXinstrument):
      doc: |
        The group explains the core instrument setup of the AFM experiment as well as the environment of the corresponding
        instruments.
      photo_detector(NXdetector):
        exists: optional
        doc: |
          The detector information.
      (NXcantilever_spm):
        exists: optional
        doc: |
          The cantilever information.
        cantilever_oscillator(NXobject):
          exists: optional
          doc: |
            A cantilever is a resemblance to a Simple Oscillator.
            In a typical AFM scan, the cantilever approaches the sample. After a certain height (z_c), the
            cantilever feels an attractive or repulsive force and the cantilever gets further closer to
            the sample until a user-defined force is reached. Later, the cantilever is retracted from the
            sample until the cantilever out of the surface force. The defection of the cantilever is measured
            by the detector (photo-diode) and the signal is converted to the electric signal and passed
             through the PID feedback loop.
          oscillator_excitation(NX_NUMBER):
            exists: optional
            unit: NX_ANY
            doc: |
              The threshold voltage for oscillator excitation.
          phase_lock_loop(NXlockin):
            exists: optional
            doc: |
              Phase locked loop for cantilever lock-in device. sample in the X-Y plan.
            amplitude_excitation(NX_NUMBER):
              exists: optional
              unit: NX_ANYws
              doc: |
                The reference amplitude (also called drive amplitude) of the cantilever.
      (NXenvironment):
        doc: |
          The environment information.
        height_piezo_sensor(NXsensor):
          doc: |
            Link to the group height_piezo_sensor.
        XY_piezo_sensor(NXsensor):
          doc: |
            Link to the group XY_piezo_sensor.
        tip_temperature(NXsensor):
          doc: |
            Link to the group cantilever_temperature.
      height_piezo_sensor(NXsensor):
        exists: optional
        doc: |
          The sensor information for the height piezo device.
        (NXpiezo_config_spm):
          doc: |
            The piezo configuration information like piezoelectric calibration and material
            properties.
        (NXpositioner_spm):
          doc: |
            The positioner information like the position of the tip, the position of the
            sample, PID loop feedback etc.
        piezo_material(NXpiezoelectric_material):
          exists: optional
          doc: |
            The material description and properties of the piezoelectric scanner materials.
      XY_piezo_sensor(NXsensor):
        exists: optional
        doc: |
          The sensor information for the xy piezo device.
        (NXpiezo_config_spm):
          doc: |
            The piezo configuration information like piezoelectric calibration and material
            properties.
        (NXpositioner_spm):
          doc: |
            The positioner information like the position of the tip, the position of the
            sample, PID loop feedback etc.
        piezo_material(NXpiezoelectric_material):
          exists: optional
          doc: |
            The material description and properties of the piezoelectric scanner materials.
      tip_temperature(NXsensor):
        exists: optional
        doc: |
          The temperature of the scan environment or tip of the cantilever.


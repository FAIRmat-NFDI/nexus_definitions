category: base
doc: |
  A base class to describe the cantilever used in Scanning Probe Microscopy (SPM)
  techniques.
type: group
NXcantilever_spm(NXobject):
  cantilever_oscillator(NXobject):
    doc: |
      A cantilever is a resemblance to a Simple Oscillator.
      In a typical AFM scan, the cantilever approaches the sample. After a certain height (z_c), the cantilever feels an attractive or repulsive force and the cantilever gets further closer to the sample until a user-defined force is reached. Later, the cantilever is retracted from the sample until the cantilever out of the surface force. The defection of the cantilever is measured by the detector (photo-diode) and the signal is converted to the electric signal and passed through the PID feedback loop, so that the piezo-electric controller moves on top of the sample in the X-Y plan.
    reference_amplitude(NX_NUMBER):
      unit: NX_ANY
      doc: |
        The reference amplitude (also called drive amplitude) of the cantilever.
    reference_frequency(NX_NUMBER):
      unit: NX_FREQUENCY
      doc: |
        The reference frequency (also called drive frequency or resonance frequency) of
        the cantilever.
    frequency_harmonic(NX_NUMBER):
      unit: NX_FREQUENCY
      doc: |
        The harmonic frequency of the cantilever.
    cantilever_phase_positioner(NXpositioner):
      doc: |
        Describes the cantilever phase positioner, if it exists.
    cantilever_frequency_positioner(NXpositioner):
      doc: |
        Describes the cantilever frequency positioner, if it exists.
    phase_lock_loop(NXlockin):
      doc: |
        Phase locked loop for cantilever lock-in device.
    frequency_shift(NX_NUMBER):
      unit: NX_FREQUENCY
      doc: |
        Shift in the resonance frequency of the cantilever.
    frequency_cutoff(NX_NUMBER):
      unit: NX_FREQUENCY
      doc: |
        The cutoff frequency of the cantilever.
    frequency_bandwith(NX_NUMBER):
      unit: NX_FREQUENCY
      doc: |
        The bandwidth of the resonance frequency.
    target_amplitude(NX_NUMBER):
      unit: NX_ANY
      doc: |
        The executive amplitude of the cantilever in the experiment.
    active_frequency(NX_NUMBER):
      unit: NX_FREQUENCY
      doc: |
        The executive frequency of the cantilever in the experiment.
  cantilever_config(NXobject):
    doc: |
      The configuration information of the cantilever such calibration information,
      material properties, etc.
    cantilever_coating:
      doc: |
        The coating name of the cantilever.
    curvature_radius(NX_NUMBER):
      unit: NX_ANY
      doc: |
        The radius of curvature of the cantilever tip.
    (NXfabrication):
      doc: |
        The fabrication information of the cantilever such as the name of the producer.
    (NXcalibration):
      doc: |
        The calibration information of the cantilever.
      sensitivity(NX_NUMBER):
        unit: NX_ANY
        doc: |
          The sensitivity of the cantilever which is calculated as the change in cantilever amplitude (in dynamic mode) or
          deflection of the cantilever due to the exerted force on cantilever tip.
      spring_constant(NX_NUMBER):
        unit: NX_ANY
        doc: |
          The spring constant coefficient for the cantilever.


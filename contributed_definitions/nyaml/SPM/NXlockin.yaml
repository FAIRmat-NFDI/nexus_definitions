category: base
doc: |
  Base classes definition for lock in devices.
  
  The lock-in amplifier information. The device is being used to extract
  the very weak signal buried in noisy signals.
  In this process, a reference signal is needed having the same frequency
  (or harmonic) and a fixed phase relationship with the input signal (burind
  in noise) that would be pulled out from the noise.
  The output will be the amplitude of the buried sign wave and phase
  relationship of the input (buried) signal to the reference signal.
  
  Finally, the output signal will be amplified to a relatively strong signal.
type: group
NXlockin(NXobject):
  hardware(NXfabrication):
    doc: |
      Hardware manufacturers and type of lockin amplifier.
  (NXamplifier):
    doc: |
      Amplifier information in the process of amplifcation of input signal after
      filtering out the noise.
  bias_divider:
    doc: |
      Bias divider for lockin channel if if has.
      Bias divider = V(ref)/[V(ref)+V(input)]
  modulation_status(NX_BOOLEAN):
    doc: |
      Switch the lock-in moulation on or off.
  modulation_signal(NX_CHAR):
    doc: |
      A modulation signal (such as bias, current et.al.) is a periodic voltage signal,
      usually applied to the surface of a sample, which serves to modify the physical
      properties of the sample surface and generate weak AC current signals that can
      be detected and analysed by instruments such as lock-in amplifiers.
  lockin_current_flip_value(NX_NUMBER):
    exists: optional
    doc: |
      The flip value of lockin current which mainly depends on the condition on the refrence
      signal.
  
  # (For bais modulate signal, it depands on the modulate type)
  
  # unit could be NX_VOLTAGE or NX_CURRENT
  reference_amplitude(NX_NUMBER):
    unit: NX_ANY
    doc: |
      Amplitude of the reference signal for the lock-in amplifier.
  reference_frequency(NX_NUMBER):
    unit: NX_FREQUENCY
    doc: |
      Frequency of the reference signal for the lock-in amplifier.
  reference_phase(NX_NUMBER):
    unit: NX_ANGLE
    doc: |
      Frequency of the reference signal for the lock-in amplifier.
  demodulated_signal(NX_CHAR):
    doc: |
      The modulated output signal will be demodulated, in order to determine the amplitude
      and phase at the frequency set in the Frequency field or harmonics, such as current,
      bias, et.al.
  demodulated_frequency(NX_NUMBER):
    unit: NX_FREQUENCY
    doc: |
      The frequency of the demodulated signal.
  frequency_demodulation_bandwidth(NX_NUMBER):
    unit: NX_FREQUENCY
    doc: |
      The bandwidth of the modulated signal that can be applied in frequency
      demodulation mechanism.
  
  # unit could be NX_VOLTAGE or NX_CURRENT
  demodulated_amplitude(NX_NUMBER):
    unit: NX_ANY
    doc: |
      The amplitude of the demodulated signal.
  amplitude_demodulation_bandwidth(NX_NUMBER):
    unit: NX_ANY
    doc: |
      The bandwidth of the modulated signal that can be applied in amplitude
      demodulation mechanism.
  demodulated_phase(NX_NUMBER):
    unit: NX_ANGLE
    doc: |
      The phase of the demodulated signal.
  phase_demodulation_bandwidth(NX_NUMBER):
    unit: NX_FREQUENCY
    doc: |
      The bandwidth of the modulated signal that can be applied in phase demodulation
      mechanism.
  demodulator_channels(NX_CHAR):
    doc: |
      List of the demodulator channels.
  low_pass_N(NX_NUMBER):
    unit: NX_FREQUENCY
    doc: |
      Frequency of the low-pass filter applied on the demodulated
      signals (X,Y), cut-off frq (low pass filter) (for each DemodulatorChannels).
  hi_pass_N(NX_NUMBER):
    unit: NX_FREQUENCY
    doc: |
      Frequency of the high-pass filter applied on the demodulation
      signal cut-off frq (hi pass filter) (for each DemodulatorChannels).
  lp_filter_order_N(NX_NUMBER):
    doc: |
      Order of the low-pass filter applied on the demodulated signals (X, Y).
      Reducing the bandwidth or increasing the order reduces noise on the demodulated signals,
      but will require longer settling and measurement times.
  hp_filter_order_N(NX_NUMBER):
    doc: |
      Order of the high-pass filter applied on the demodulation
      signal. This is used mainly to suppress a DC component of the input
      signal noise.
  ref_phase_N(NX_NUMBER):
    unit: NX_ANGLE
    doc: |
      Reference phase of reference signal with respect to the demodulated signal
      (foreach Channels).
  integration_time(NX_NUMBER):
    unit: NX_TIME
    doc: |
      Time during which the data are acquired and averaged. (for the input filter)
  harmonic_order_N(NX_NUMBER):
    doc: |
      The order of the harmonic oscillation of the reference signal.
      (with respect to the modulation frequency)
  sensitivity_factor(NX_NUMBER):
    doc: |
      Ratio of output signal amplitude to input signal amplitue (V/V)
      or Q-factor to measure the sharpness or damping of a oscillating signal.


category: application
doc: |
  Scanning Probe Microscopy (SPM) is a branch of microscopy to study the surface of
  materials at the Atomic level. The technique is mainly motivated from the quantum
  tunneling effect theory though a few of it successor techniques such AFM uses
  electrostatic forces or atomic forces to study the surface of the materials.
  
  This base class mainly is designed as a sckeleton or contains common concepts for
  other SPM sub-techniques such as STM, STS, AFM, etc.

# https://thesis.library.caltech.edu/1943/4/03chapter3.pdf
type: group
NXspm(NXsensor_scan):
  (NXentry):
    definition:
      doc: |
        Name of the definition that is used for the application.
      enumeration: [NXspm]
    scan_mode:
      doc: |
        The mode of the scan.
    experiment_instrument(NXinstrument):
      doc: |
        The instrument information.
      hardware(NXfabrication):
        doc: |
          The hardware description of the core instrument setup of the experiment.
          Usually, the entire instrument is supplied by a single manufacturer.
          To describe the hardware from any sub-components, use the hardware group of that
          sub-component (child group of the NXinstrument group) group.
        vendor:
          doc: |
            Company name of the manufacturer.
        model:
          doc: |
            Version or model of the component named by the manufacturer.
          \@version:
            exists: optional
            doc: |
              If different versions exist are possible, the value in this field should be made
              specific enough to resolve the version.
      software(NXfabrication):
        doc: |
          The software description of the core instrument setup of the experiment.
          Usually, the entire instrument is supplied by a single name/manufacturer/model/etc.
          To describe the software from any sub-components, use the software group.
        vendor:
          doc: |
            Company name of the manufacturer.
        model:
          doc: |
            Version or model of the component named by the manufacturer.
          \@version:
            exists: optional
            doc: |
              If different versions exist are possible, the value in this field should be made
              specific enough to resolve the version.
      real_time_controller(NXrcs):
        exists: optional
        doc: |
          The real-time controller information.
      (NXlockin):
        exists: optional
        doc: |
          The lock-in amplifier information.
      (NXenvironment):
        doc: |
          The environment information.
        current_sensor(NXsensor):
          exists: optional
          doc: |
            This is a link to the current_sensor under the instrument group.
        volatage_sensor(NXsensor):
          exists: optional
          doc: |
            This is a link to the voltage_sensor under the instrument group.
        piazo_sensor(NXsensor):
          exists: optional
          doc: |
            This is a link to the piazo_sensor under the instrument group.
        (NXscan_control):
          doc: |
            The scan control information like scan region or phase space, type of scan (e.g.
            mesh, spiral, etc.), and scan speed, etc. This group mainly stores the raw scan
            data. For processed data or final experimental data would go to NXdata group.
      current_sensor(NXsensor):
        exists: optional
        doc: |
          The sensor information.
        (NXamplifier):
          exists: optional
          doc: |
            An amplifier information for the input signal (e.g. from tip).
      volatage_sensor(NXsensor):
        exists: optional
        doc: |
          The sensor information for the voltage device.
        (NXamplifier):
          exists: optional
      piazo_sensor(NXsensor):
        (NXpiezo_config_spm):
          doc: |
            The piezo configuration information like piezoelectric calibration and material
            properties.
        (NXpositioner_spm):
          doc: |
            The positioner information like the position of the tip, the position of the
            sample, PID loop feedback etc.
        piezo_material(NXpiezoelectric_material):
          exists: optional
          doc: |
            The material description and properties of the piezoelectric scanner materials.
      TEMPERATURE(NXsensor):
        exists: optional
        doc: |
          A group handling the temperature such as cryo, shield and tip. For different
          type of temperature sensors repeat this group.
        temperature(NX_NUMBER):
          unit: NX_TEMPERATURE
          doc: |
            The temperature of the sample.
        CHANNEL_temp(NX_CHAR):
          exists: optional
          doc: |
            The name of the channel to measure the temperature.
        temperature_calibration(NXcalibration):
          exists: optional
          doc: |
            Calibration of the temperature measurement.
          caliberation_time(NX_DATE_TIME):
            unit: NX_TIME
            doc: |
              The time or period is taken by the calibration to setup to acquire the data for
              the calibration.
          coefficients(NX_NUMBER):
            unit: NX_ANY
            doc: |
              The coefficients of the calibration.
      sample_bias_votage(NXsensor):
        exists: optional
        doc: |
          The DC bias voltage that is applied to the sample.
        bias_voltage(NX_NUMBER):
          unit: NX_VOLTAGE
          doc: |
            The bias voltage (DC) applied to the sample.
        bias_offset(NX_NUMBER):
          exists: optional
          unit: NX_VOLTAGE
          doc: |
            Offset value of the bias voltage.
        bias_calibration(NXcalibration):
          exists: optional
          doc: |
            Calibration of the bias voltage measurement (V/V).
          caliberation_time(NX_DATE_TIME):
            exists: optional
            unit: NX_TIME
            doc: |
              The time or period is taken by the calibration to setup to acquire the data for
              the calibration.
          coefficients(NX_NUMBER):
            exists: optional
            unit: NX_ANY
            doc: |
              The coefficients of the calibration.
    (NXsample):
      doc: |
        The sample information.
      sample_environment(NXenvironment):
        doc: |
          Information of environment around the sample.
        sample_bias_voltage(NXsensor):
          doc: |
            Link to the sample_bias_voltage sensor under the instrument.
    reproducibility_indicators(NXobject):
      doc: |
        The reproducibility indicators are the indicators (links to the existing fields in different groups) that are used to measure the reproducibility of the
        experiment. The reproducibility is the ability of the experiment to produce the same results when
        performed under the same conditions.
    resolution_indicators(NXobject):
      doc: |
        The resolution indicators are the indicators (links to the existing fields in different groups) that are used to measure the resolution of the
        experiment. The resolution is the ability of the experiment to generate fine plots or images from the scan data.

